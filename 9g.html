<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9g Challenge Exercise</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      .container {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
      }

      .sub-container {
        display: flex;
        flex-direction: column;
        width: 200px;
        margin: 8px 10px 0px 8px;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.3);
      }

      img {
        width: 100%;
      }

      .name {
        font-size: 18px;
        font-weight: bold;
        margin: 10px 0px 10px 10px;
      }

      .mutual {
        margin: 10px 0px 10px 10px;
        color: rgb(100, 100, 100);
        margin-left: 8px;
        margin-bottom: 12px;
      }

      button {
        margin: 10px 0px 20px 10px;
        background-color: rgb(24, 119, 242);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        font-size: 16px;
        width: 60%;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sub-container">
        <img src="images/7g.jpg" alt="Image is missing" />
        <div class="name">Oliver</div>

        <button>Add Friend</button>
      </div>

      <div class="sub-container">

      </div>

      </div>
    </div>
  </body>
</html>
