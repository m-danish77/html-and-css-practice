<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3f Challenge Exercise</title>
    <style>
      a {
        color: rgb(0, 113, 133);
        transition: color 0.25s;
      }

      a:hover {
        color: rgb(199, 81, 31);
      }

      .shoes {
        font-size: 24px;
        font-weight: bold;
      }

      .price {
        color: rgb(0, 118, 0);
        font-weight: bold;
      }

      .add-to-cart {
        padding: 9px 18px;
        color: black;
        background-color: rgb(249, 217, 76);
        border: none;
        border-radius: 25px;
        margin-right: 10px;
        cursor: pointer;
        transition: background-color 0.5s;
      }

      .add-to-cart:hover {
        background-color: rgb(247, 202, 0);
      }

      .add-to-cart:active {
        background-color: rgba(247, 202, 0, 0.5);
      }

      .buy-now {
        padding: 9px 18px;
        color: black;
        background-color: rgb(255, 164, 28);
        border: none;
        border-radius: 25px;
        cursor: pointer;
        transition:
          background-color 0.5s,
          box-shadow 0.5s;
      }

      .buy-now:hover {
        background-color: rgb(250, 137, 0);
        box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.5);
      }

      .buy-now:active {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <a href="http://www.amazon.com/">Back to Amazon</a>
    <p class="shoes">Nike Black Running Shoes</p>
    <p class="price">$39 - in stock.</p>
    <p class="delivery">Free delivery tomorrow.</p>
    <button class="add-to-cart">Add to Cart</button>
    <button class="buy-now">Buy now</button>
  </body>
</html>
