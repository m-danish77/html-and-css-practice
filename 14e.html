<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>14e Challenge Exercise</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        margin-bottom: 3000px;
      }

      .header {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
      }

      .left-header {
        display: flex;
        flex-direction: row;
        align-items: center;
        margin: 15px 0px 0px 30px;
      }

      .right-header {
        display: flex;
        flex-direction: row;
        align-items: center;
        margin: 15px 30px 0px 0px;
      }

      img {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
      }

      .left-header > div {
        font-size: 16px;
        margin-left: 10px;
        font-weight: bold;
      }

      .add-friend {
        background-color: rgb(24, 119, 242);
        color: white;
        font-weight: bold;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
        margin-right: 7px;
      }

      .message {
        background-color: rgb(230, 230, 230);
        color: black;
        font-weight: bold;
        border: none;
        padding: 8px 12px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="left-header">
        <img src="images/7g.jpg" alt="Image is missing." />
        <div>Oliver Cat</div>
      </div>
      <div class="right-header">
        <button class="add-friend">Add Friend</button>
        <button class="message">Message</button>
      </div>
    </div>
  </body>
</html>
