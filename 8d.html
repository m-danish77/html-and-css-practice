<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>8d Exercise Solution</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .container {
        display: flex;
        flex-direction: column;
        width: 300px;
        margin: 10px 0px 0px 10px;
      }

      .sub-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }

      .first,
      .last {
        width: 140px;
        font-size: 15px;
        padding: 12px 16px;
        border: 1px solid rgb(200, 200, 200);
        border-radius: 10px;
      }

      .email {
        width: 300px;
        font-size: 15px;
        padding: 12px 16px;
        border: 1px solid rgb(200, 200, 200);
        border-radius: 10px;
        margin: 10px 0px 10px 0px;
      }

      button {
        background-color: rgb(47, 127, 231);
        color: white;
        border: none;
        padding-top: 14px;
        padding-bottom: 14px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sub-container">
        <input class="first" type="text" placeholder="First name" />
        <input class="last" type="text" placeholder="First name" />
      </div>
      <input class="email" type="email" placeholder="Email" />
      <button>Sign Up</button>
    </div>
  </body>
</html>
