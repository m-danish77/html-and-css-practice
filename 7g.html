<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7g Exercise Solution</title>
    <style>
      .container {
        display: flex;
        flex-direction: row;
      }

      img {
        height: 50px;
        width: 50px;
        object-fit: cover;
        border-radius: 25px;
      }

      input {
        border: none;
        margin-left: 10px;
        font-size: 20px;
        height: 25px;
        margin-top: 11px;
      }

      button {
        border: none;
        background-color: rgb(29, 155, 240);
        color: white;
        font-weight: bold;
        height: 40px;
        font-size: 16px;
        padding: 0px 16px;
        border-radius: 30px;
        margin: 5px 0px 0px 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="images/7g.jpg" alt="Image is missing" />
      <input type="text" placeholder="What's happening?" />
      <button>Tweet</button>
    </div>
  </body>
</html>
